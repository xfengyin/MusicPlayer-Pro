name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Build web
        run: |
          cd web
          npm install
          npm run build || true
      
      - name: Build server
        run: |
          cd server
          go build ./...
      
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: web/dist server/dist

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
      - uses: softprops/action-gh-release@v1
        with:
          files: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
