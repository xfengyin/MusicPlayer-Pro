name: CI
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build web
        run: |
          cd web
          npm install
      - name: Build server
        run: |
          cd server
          go build ./...
      - run: echo done
