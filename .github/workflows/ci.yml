name: Build & Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package.json
      
      - name: Install web dependencies
        run: cd web && npm ci
      
      - name: Install server dependencies
        run: cd server && GOPROXY=direct go mod download
      
      - name: Lint web
        run: cd web && npm run lint
      
      - name: Test server
        run: cd server && go test ./...

  build-web-server:
    name: Build Web & Server
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package.json
      
      - name: Build web
        run: |
          cd web
          npm ci
          npm run build
      
      - name: Build server
        run: |
          cd server
          GOPROXY=direct go mod download
          go build -o dist/server cmd/server/main.go
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-server
          path: |
            web/dist
            server/dist

  build-desktop:
    name: Build Desktop Apps
    runs-on: ${{ matrix.os }}
    needs: build-web-server
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-server
          path: electron/renderer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Electron
        run: npm install electron@28 -g

      - name: Install electron-builder
        run: npm install electron-builder@24 -g

      - name: Build ${{ matrix.platform }}
        run: |
          cd electron
          npm install
          npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-app
          path: electron/dist/**/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}