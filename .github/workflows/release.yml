# MusicPlayer-Pro 云端构建自动发布工作流
# 触发条件：推送 tag (v*) 或手动触发

name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.5)'
        required: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: electron
        run: pnpm install --frozen-lockfile

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: electron
        run: pnpm build:linux

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        working-directory: electron
        run: pnpm build:mac

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        working-directory: electron
        run: pnpm build:win

      - name: List built artifacts
        run: |
          echo "=== Artifacts ==="
          find electron/dist -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.zip" \) 2>/dev/null || echo "No artifacts found"

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: electron/dist/**/*.AppImage
          retention-days: 5

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: electron/dist/**/*.dmg
          retention-days: 5

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: electron/dist/**/*.exe
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: |
          echo "=== All artifacts ==="
          find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup-branches:
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Delete merged branches
        run: |
          # This would need proper GitHub token with repo:delete_scope
          echo "Branch cleanup would happen here"
