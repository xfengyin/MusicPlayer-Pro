name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install web deps
        working-directory: web
        run: npm install
      - name: Build web
        working-directory: web
        run: npm run build
      - name: Prepare renderer
        shell: bash
        run: |
          mkdir -p electron/renderer
          cp -r web/dist/* electron/renderer/
      - name: Install electron deps
        working-directory: electron
        run: npm install
      - name: Build Windows
        working-directory: electron
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            electron/dist/*.exe
            electron/dist/*.msi
          if-no-files-found: warn

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install web deps
        working-directory: web
        run: npm install
      - name: Build web
        working-directory: web
        run: npm run build
      - name: Prepare renderer
        run: |
          mkdir -p electron/renderer
          cp -r web/dist/* electron/renderer/
      - name: Install electron deps
        working-directory: electron
        run: npm install
      - name: Build Linux
        working-directory: electron
        run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: warn

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install web deps
        working-directory: web
        run: npm install
      - name: Build web
        working-directory: web
        run: npm run build
      - name: Prepare renderer
        run: |
          mkdir -p electron/renderer
          cp -r web/dist/* electron/renderer/
      - name: Install electron deps
        working-directory: electron
        run: npm install
      - name: Build macOS
        working-directory: electron
        run: npx electron-builder --mac --universal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
          if-no-files-found: warn

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install web deps
        working-directory: web
        run: npm install
      - name: Build web
        working-directory: web
        run: npm run build
      - name: Init Capacitor Android
        working-directory: web
        run: |
          npx cap add android
          npx cap sync android
      - name: Build APK
        working-directory: web/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp web/android/app/build/outputs/apk/debug/app-debug.apk apk-output/MusicPlayerPro-v${{ github.ref_name || 'dev' }}.apk 2>/dev/null || cp web/android/app/build/outputs/apk/debug/app-debug.apk apk-output/MusicPlayerPro.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apk-output/*.apk
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: false
      - name: List files
        run: find release -type f | head -30
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
            release/**/*.msi
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.dmg
            release/**/*.zip
            release/**/*.apk
          draft: false
          generate_release_notes: true
