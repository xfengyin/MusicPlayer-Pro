name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install web deps
        working-directory: web
        run: npm install

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Prepare renderer
        run: |
          mkdir -p electron/renderer
          cp -r web/dist/* electron/renderer/

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build Windows
        working-directory: electron
        run: npm run build:win

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: electron/dist/win-unpacked/*.exe
          if-no-files-found: warn

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temulin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install web deps
        working-directory: web
        run: npm install

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Prepare renderer
        run: |
          mkdir -p electron/renderer
          cp -r web/dist/* electron/renderer/

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build Android
        working-directory: electron
        run: npm run build:android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: electron/dist/*.apk
          if-no-files-found: warn

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows-exe/*.exe
            release/android-apk/*.apk
          draft: false
          generate_release_notes: true
