name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install deps
        working-directory: electron
        run: pnpm install
      
      - name: Build (dev mode test)
        working-directory: electron
        run: |
          pnpm build:win || echo "Windows build may need special env"
          pnpm build:linux || echo "Linux build failed"
          ls -la dist/ || echo "No dist folder"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            electron/dist/**/*.exe
            electron/dist/**/*.AppImage
            electron/dist/**/*.deb
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

