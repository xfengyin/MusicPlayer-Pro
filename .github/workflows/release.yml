name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install deps
        working-directory: electron
        run: pnpm install
      
      - name: Build
        working-directory: electron
        run: pnpm build:win
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: electron/dist/

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install deps
        working-directory: electron
        run: pnpm install
      
      - name: Build
        working-directory: electron
        run: pnpm build:mac
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: electron/dist/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install deps
        working-directory: electron
        run: pnpm install
      
      - name: Build
        working-directory: electron
        run: pnpm build:linux
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: electron/dist/

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all
        uses: actions/download-artifact@v4
      
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.exe
            **/*.dmg
            **/*.AppImage
            **/*.deb
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

